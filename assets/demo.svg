<svg width="1040" height="620" viewBox="0 0 1040 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MCP Security Toolkit terminal demo</title>
  <desc id="desc">Terminal output showing mcp-sec scan detecting high risk MCP server findings.</desc>
  <rect width="1040" height="620" rx="18" fill="#0D1117"/>
  <rect x="0" y="0" width="1040" height="54" rx="18" fill="#161B22"/>
  <circle cx="28" cy="27" r="7" fill="#FF5F56"/>
  <circle cx="52" cy="27" r="7" fill="#FFBD2E"/>
  <circle cx="76" cy="27" r="7" fill="#27C93F"/>
  <text x="104" y="33" fill="#8B949E" font-family="SFMono-Regular,Consolas,Liberation Mono,monospace" font-size="15">mcp-security-toolkit</text>

  <text x="34" y="94" fill="#58A6FF" font-family="SFMono-Regular,Consolas,Liberation Mono,monospace" font-size="18">$</text>
  <text x="58" y="94" fill="#C9D1D9" font-family="SFMono-Regular,Consolas,Liberation Mono,monospace" font-size="18">npx mcp-security-toolkit scan ./examples/unsafe-filesystem-mcp</text>

  <text x="34" y="144" fill="#F0F6FC" font-family="SFMono-Regular,Consolas,Liberation Mono,monospace" font-size="22" font-weight="700">MCP Security Scan</text>
  <text x="34" y="184" fill="#8B949E" font-family="SFMono-Regular,Consolas,Liberation Mono,monospace" font-size="16">Target: ./examples/unsafe-filesystem-mcp</text>

  <rect x="34" y="214" width="190" height="44" rx="8" fill="#3D1D1D" stroke="#F85149"/>
  <text x="54" y="243" fill="#FF7B72" font-family="SFMono-Regular,Consolas,Liberation Mono,monospace" font-size="18" font-weight="700">Risk: HIGH</text>

  <rect x="250" y="214" width="185" height="44" rx="8" fill="#1F2A36" stroke="#30363D"/>
  <text x="270" y="243" fill="#C9D1D9" font-family="SFMono-Regular,Consolas,Liberation Mono,monospace" font-size="18">13 findings</text>

  <rect x="34" y="294" width="972" height="70" rx="10" fill="#161B22" stroke="#30363D"/>
  <text x="56" y="322" fill="#FF7B72" font-family="SFMono-Regular,Consolas,Liberation Mono,monospace" font-size="16" font-weight="700">[HIGH] Potential command execution detected: bash</text>
  <text x="56" y="348" fill="#8B949E" font-family="SFMono-Regular,Consolas,Liberation Mono,monospace" font-size="14">Require approval, sandbox execution, and restrict this tool for autonomous agents.</text>

  <rect x="34" y="384" width="972" height="70" rx="10" fill="#161B22" stroke="#30363D"/>
  <text x="56" y="412" fill="#FFA657" font-family="SFMono-Regular,Consolas,Liberation Mono,monospace" font-size="16" font-weight="700">[MEDIUM] Potential secret reference detected: GITHUB_TOKEN</text>
  <text x="56" y="438" fill="#8B949E" font-family="SFMono-Regular,Consolas,Liberation Mono,monospace" font-size="14">Load secrets through a secure store and redact sensitive values from logs and responses.</text>

  <rect x="34" y="474" width="972" height="70" rx="10" fill="#161B22" stroke="#30363D"/>
  <text x="56" y="502" fill="#FF7B72" font-family="SFMono-Regular,Consolas,Liberation Mono,monospace" font-size="16" font-weight="700">[HIGH] Risky tool detected: write_file, delete_file, read_env_vars</text>
  <text x="56" y="528" fill="#8B949E" font-family="SFMono-Regular,Consolas,Liberation Mono,monospace" font-size="14">Use least privilege and disable risky tools unless the workflow requires them.</text>

  <text x="34" y="584" fill="#3FB950" font-family="SFMono-Regular,Consolas,Liberation Mono,monospace" font-size="16">Use in CI: exits with code 2 when high-risk MCP findings are detected.</text>
</svg>
